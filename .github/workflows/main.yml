name: Hprofile Actions
on: [push, workflow_dispatch]
jobs:
  Testing:
    runs-on: ubuntu-latest
    steps:
      - name: Testing workflow
        run: echo "Workflow works!"

      - name: Code checkout
        run: actions/checkout@v5

      - name: Maven test
        run: mvn test

      - name: Checkstyle Analysis
        run: mvn checkstyle:checkstyle